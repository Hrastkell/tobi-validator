name: "Organetic Tobi Validator"
description: "GitHub Action wrapper for the released Stage 1 Tobi Validator line with controlled evaluation or private artifact access"

branding:
  icon: "shield"
  color: "purple"

inputs:
  eval_token:
    description: "7-day evaluation token issued by Organetic evaluation broker"
    required: false
  dist_token:
    description: "Read-only token with access to the private OrganeticSphere/tobi-validator-dist repository"
    required: false
  version:
    description: "Release tag in OrganeticSphere/tobi-validator-dist"
    required: false
    default: "stage1-tobi-validator-v0.7.0"
  dist_repo:
    description: "Private distribution repository containing the validator release assets"
    required: false
    default: "OrganeticSphere/tobi-validator-dist"
  archive_name:
    description: "Bundle archive name"
    required: false
    default: "stage1-tobi-validator-v0.7.0-windows-x86_64.zip"
  archive_sha256_name:
    description: "Checksum sidecar name for the outer bundle archive"
    required: false
    default: "stage1-tobi-validator-v0.7.0-windows-x86_64.zip.sha256"
  mode:
    description: "Validator mode: canon or golden"
    required: true
  canon_input:
    description: "Path to the input file for canon mode"
    required: false
    default: "examples/sample.tsubasa"
  golden_fixtures:
    description: "Path to the fixture JSON for golden mode"
    required: false
    default: "examples/golden/fixtures.json"

runs:
  using: "composite"
  steps:
    - name: Validate inputs
      shell: powershell
      run: |
        $mode = "${{ inputs.mode }}".ToLowerInvariant()
        $evalToken = "${{ inputs.eval_token }}"
        $distToken = "${{ inputs.dist_token }}"

        if ([string]::IsNullOrWhiteSpace($evalToken) -and [string]::IsNullOrWhiteSpace($distToken)) {
          throw "Provide either 'eval_token' or 'dist_token'."
        }

        if ($mode -ne "canon" -and $mode -ne "golden") {
          throw "Input 'mode' must be either 'canon' or 'golden'."
        }

    - name: Download bundle via evaluation broker
      if: ${{ inputs.eval_token != '' }}
      shell: powershell
      run: |
        $brokerUrl = "https://api.organetic.ai/api/eval/download"
        $version = "${{ inputs.version }}"
        $archiveName = "${{ inputs.archive_name }}"
        $shaName = "${{ inputs.archive_sha256_name }}"
        $repo = "${{ github.repository }}"
        $runId = "${{ github.run_id }}"
        $token = "${{ inputs.eval_token }}"

        $headers = @{
          Authorization = "Bearer $token"
          "Content-Type" = "application/json"
        }

        $archiveBody = @{
          version = $version
          asset = $archiveName
          repo = $repo
          run_id = $runId
        } | ConvertTo-Json -Compress

        $shaBody = @{
          version = $version
          asset = $shaName
          repo = $repo
          run_id = $runId
        } | ConvertTo-Json -Compress

        Invoke-WebRequest -Method POST -Uri $brokerUrl -Headers $headers -Body $archiveBody -OutFile $archiveName
        Invoke-WebRequest -Method POST -Uri $brokerUrl -Headers $headers -Body $shaBody -OutFile $shaName

    - name: Resolve private release directly
      if: ${{ inputs.eval_token == '' && inputs.dist_token != '' }}
      shell: powershell
      run: |
        $headers = @{
          Authorization = "Bearer ${{ inputs.dist_token }}"
          Accept = "application/vnd.github+json"
          "X-GitHub-Api-Version" = "2022-11-28"
        }

        $repo = "${{ inputs.dist_repo }}"
        $tag = "${{ inputs.version }}"
        $releaseUrl = "https://api.github.com/repos/$repo/releases/tags/$tag"

        try {
          $release = Invoke-RestMethod -Uri $releaseUrl -Headers $headers -Method Get -ErrorAction Stop
        }
        catch {
          throw "Failed to resolve private release '$tag' in '$repo'. Check that the tag exists and that 'dist_token' has read access."
        }

        $archiveName = "${{ inputs.archive_name }}"
        $shaName = "${{ inputs.archive_sha256_name }}"

        $archiveAsset = $release.assets | Where-Object { $_.name -eq $archiveName } | Select-Object -First 1
        $shaAsset = $release.assets | Where-Object { $_.name -eq $shaName } | Select-Object -First 1

        if ($null -eq $archiveAsset) {
          throw "Release asset not found: $archiveName"
        }

        if ($null -eq $shaAsset) {
          throw "Release asset not found: $shaName"
        }

        "TOBI_ASSET_URL=$($archiveAsset.url)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "TOBI_SHA_ASSET_URL=$($shaAsset.url)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Download private bundle assets directly
      if: ${{ inputs.eval_token == '' && inputs.dist_token != '' }}
      shell: powershell
      run: |
        $downloadHeaders = @{
          Authorization = "Bearer ${{ inputs.dist_token }}"
          Accept = "application/octet-stream"
          "X-GitHub-Api-Version" = "2022-11-28"
        }

        Invoke-WebRequest -Uri $env:TOBI_ASSET_URL -Headers $downloadHeaders -OutFile "${{ inputs.archive_name }}"
        Invoke-WebRequest -Uri $env:TOBI_SHA_ASSET_URL -Headers $downloadHeaders -OutFile "${{ inputs.archive_sha256_name }}"

    - name: Verify bundle checksum
      shell: powershell
      run: |
        $expectedLine = (Get-Content "${{ inputs.archive_sha256_name }}" -Raw).Trim()
        $expectedHash = ($expectedLine -split '\s+')[0].ToLowerInvariant()
        $actualHash = (Get-FileHash "${{ inputs.archive_name }}" -Algorithm SHA256).Hash.ToLowerInvariant()

        if ($actualHash -ne $expectedHash) {
          throw "Archive checksum mismatch. Expected $expectedHash but got $actualHash."
        }

    - name: Extract bundle
      shell: powershell
      run: |
        Expand-Archive -LiteralPath "${{ inputs.archive_name }}" -DestinationPath ".\tobi-bundle" -Force

    - name: Resolve extracted tobi executable
      shell: powershell
      run: |
        $exe = Get-ChildItem -Path ".\tobi-bundle" -Filter "tobi.exe" -Recurse | Select-Object -First 1

        if ($null -eq $exe) {
          throw "tobi.exe was not found anywhere under .\tobi-bundle after archive extraction."
        }

        "TOBI_EXE_PATH=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Run canon
      if: ${{ inputs.mode == 'canon' }}
      shell: powershell
      run: |
        $inputPath = "${{ inputs.canon_input }}"
        if (-not (Test-Path -LiteralPath $inputPath)) {
          throw "Canon input not found: $inputPath"
        }

        $resolvedInput = (Resolve-Path -LiteralPath $inputPath).Path
        & "$env:TOBI_EXE_PATH" canon $resolvedInput

    - name: Run golden
      if: ${{ inputs.mode == 'golden' }}
      shell: powershell
      run: |
        $fixturesPath = "${{ inputs.golden_fixtures }}"
        if (-not (Test-Path -LiteralPath $fixturesPath)) {
          throw "Fixture file not found: $fixturesPath"
        }

        $resolvedFixtures = (Resolve-Path -LiteralPath $fixturesPath).Path
        & "$env:TOBI_EXE_PATH" golden $resolvedFixtures
